<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0c0e14"/>
      <stop offset="100%" stop-color="#06070a"/>
    </radialGradient>
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00ffe5"/>
      <stop offset="60%" stop-color="#00ffe5"/>
      <stop offset="85%" stop-color="#ffb627"/>
      <stop offset="100%" stop-color="#ff2d6f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00ffe5" stroke-width="2" opacity="0.25"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#00ffe5" stroke-width="2" opacity="0.15"/>

  <!-- Equalizer bars centered -->
  <g filter="url(#glow)" transform="translate(256, 320)">
    <rect x="-140" y="-60"  width="22" height="60"  fill="url(#bars)"/>
    <rect x="-110" y="-110" width="22" height="110" fill="url(#bars)"/>
    <rect x="-80"  y="-160" width="22" height="160" fill="url(#bars)"/>
    <rect x="-50"  y="-200" width="22" height="200" fill="url(#bars)"/>
    <rect x="-20"  y="-130" width="22" height="130" fill="url(#bars)"/>
    <rect x="10"   y="-180" width="22" height="180" fill="url(#bars)"/>
    <rect x="40"   y="-95"  width="22" height="95"  fill="url(#bars)"/>
    <rect x="70"   y="-145" width="22" height="145" fill="url(#bars)"/>
    <rect x="100"  y="-70"  width="22" height="70"  fill="url(#bars)"/>
  </g>

  <!-- Baseline -->
  <line x1="100" y1="322" x2="412" y2="322" stroke="#00ffe5" stroke-width="2" opacity="0.6"/>
</svg>
